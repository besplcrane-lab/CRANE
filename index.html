<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crane Fleet Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0061ff;
            --primary-dark: #004ecc;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Login Styles --- */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f0f4f8 url('data:image/svg+xml,<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1" fill="%23cbd5e1" fill-opacity="0.5"/></svg>');
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: left;
            position: relative;
        }

        .login-logos {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .login-logos img {
            height: 40px;
            object-fit: contain;
        }

        .login-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #001529;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .login-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }

        .login-input:focus {
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2b3a8e; /* Matches the screenshot blue */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #1e296b;
        }

        .login-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .user-display {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #1e293b;
        }

        /* --- Dashboard Styles --- */
        #main-dashboard {
            display: none;
        }

        .header {
            background: white;
            padding: 20px 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-section {
            background: #fff;
            padding: 15px 0;
            border-bottom: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .logo-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            padding: 0 15px;
        }

        .main-company-logos {
            display: flex;
            gap: 25px;
            border-right: 2px solid #e2e8f0;
            padding-right: 25px;
        }

        .client-logos {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .logo-item {
            height: 45px;
            object-fit: contain;
            transition: all 0.3s ease;
            opacity: 1;
        }

        .logo-item:hover {
            transform: scale(1.1);
        }

        .main-logo {
            height: 60px;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-align: center;
            width: 100%;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            justify-content: center;
        }

        .search-wrapper {
            position: relative;
            grid-column: span 1;
        }

        @media (min-width: 900px) {
            .search-wrapper { grid-column: span 2; }
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input, .filter-select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            background: #fff;
            box-sizing: border-box;
            height: 48px;
        }

        .filter-select {
            padding-left: 15px;
            cursor: pointer;
            font-weight: 600;
            background-color: #f1f5f9;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2003/svg' fill='none' viewBox='0 0 24 24' stroke='%2364748b'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'%3E%3C/path%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
        }

        .stats-bar {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .counter {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            background: #eff6ff;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reg-no { font-weight: 800; font-size: 1.15rem; color: #1e293b; }
        
        .status-badge {
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status-expired { background: #fee2e2; color: #ef4444; }
        .status-active { background: #dcfce7; color: #10b981; }
        .status-maintenance { background: #f1f5f9; color: #64748b; }

        .card-body { padding: 20px; }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #f1f5f9;
        }

        .info-row.hidden { display: none; }

        .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            max-width: 60%;
        }

        .value {
            font-size: 0.85rem;
            font-weight: 800;
            text-align: right;
        }

        .val-active { color: var(--success); }
        .val-expired { color: var(--danger); background: #fee2e2; padding: 2px 8px; border-radius: 4px; }
        .val-normal { color: var(--text-main); }

        #loading { text-align: center; padding: 100px; font-weight: 600; color: var(--text-muted); display: none; }
        #no-results { grid-column: 1 / -1; text-align: center; padding: 80px; background: white; border-radius: 20px; display: none; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .controls { grid-template-columns: 1fr; }
            .main-company-logos { border-right: none; padding-right: 0; margin-bottom: 15px; }
            .logo-container { justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <div class="login-logos">
                <img src="BESPL Logo.jpg" alt="BESPL" onerror="this.style.display='none'">
                <img src="DBS Logo.jpg" alt="DBS" onerror="this.style.display='none'">
                <img src="KAYPEE LOGO.jpg" alt="KAYPEE" onerror="this.style.display='none'">
            </div>
            
            <h2>Login to your account</h2>

            <!-- Step 1: User ID -->
            <div id="step-userid">
                <div class="input-group">
                    <label>Domain ID (PP number) / PRM ID</label>
                    <input type="text" id="userIdInput" class="login-input" placeholder="Enter Domain ID (PP number) / PRM ID">
                </div>
                <button class="login-btn" onclick="goToPassword()">Next ➔</button>
            </div>

            <!-- Step 2: Password (hidden initially) -->
            <div id="step-password" style="display: none;">
                <div class="user-display">
                    <span id="display-user"></span>
                    <span style="cursor:pointer; color:#2b3a8e" onclick="backToUser()">✏️</span>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="passwordInput" class="login-input" placeholder="Enter password">
                </div>
                <button class="login-btn" onclick="attemptLogin()">Login ➔</button>
                <div style="margin-top: 15px; text-align: right;">
                    <a href="#" style="font-size: 0.75rem; color: #2b3a8e; text-decoration: none;">Reset Domain ID Password</a>
                </div>
            </div>

            <div class="login-footer">
                Need help in login? <a href="#">Contact Support</a>
            </div>
        </div>
    </div>

    <!-- Main Dashboard (hidden until login) -->
    <div id="main-dashboard">
        <div class="brand-section">
            <div class="section-label">Our Groups & Valued Clients</div>
            <div class="logo-container">
                <div class="main-company-logos">
                    <img src="BESPL Logo.jpg" alt="BESPL" class="logo-item main-logo" onerror="this.style.display='none'">
                    <img src="DBS Logo.jpg" alt="DBS" class="logo-item main-logo" onerror="this.style.display='none'">
                    <img src="KAYPEE LOGO.jpg" alt="KAYPEE" class="logo-item main-logo" onerror="this.style.display='none'">
                </div>
                <div class="client-logos">
                    <img src="B&R.png" alt="B&R" class="logo-item" title="B&R" onerror="this.style.display='none'">
                    <img src="DCM Shriram.png" alt="DCM Shriram" class="logo-item" title="DCM Shriram" onerror="this.style.display='none'">
                    <img src="GNFC.png" alt="GNFC" class="logo-item" title="GNFC" onerror="this.style.display='none'">
                    <img src="HINDALCO.png" alt="HINDALCO" class="logo-item" title="HINDALCO" onerror="this.style.display='none'">
                    <img src="ONGC.png" alt="ONGC" class="logo-item" title="ONGC" onerror="this.style.display='none'">
                    <img src="RIL.png" alt="RIL" class="logo-item" title="RIL" onerror="this.style.display='none'">
                </div>
            </div>
        </div>

        <div class="header">
            <h1>🏗️ CRANE-FLEET <span style="color:var(--primary)">PRO</span></h1>
            
            <div class="controls">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search Reg. No..." onkeyup="filterCards()">
                </div>
                
                <select id="expiryFilter" class="filter-select" onchange="filterCards()">
                    <option value="all">📂 ALL DOCUMENTS</option>
                    <option value="puc">⚠️ PUC VALID UP TO</option>
                    <option value="insurance">🛡️ INSURANCE VALID UP TO</option>
                    <option value="fitness">🔧 FITNESS VALID UP TO</option>
                    <option value="permit">📝 ROAD TAX VALID UP TO</option>
                    <option value="form10">📄 FORM-10 VALID UP TO</option>
                    <option value="validupto">📅 PERMIT VALID UP TO</option>
                    <option value="any">🚨 ANY EXPIRED</option>
                </select>

                <select id="bodyFilter" class="filter-select" onchange="filterCards()">
                    <option value="all">🚜 ALL BODY TYPES</option>
                </select>

                <select id="companyFilter" class="filter-select" onchange="filterCards()">
                    <option value="all">🏢 ALL COMPANIES</option>
                </select>
            </div>

            <div class="stats-bar">
                <div class="counter" id="totalVehicles">Total: --</div>
                <div class="counter" id="showingCount">Showing: --</div>
            </div>
        </div>

        <div id="loading">Syncing Fleet Data...</div>

        <div class="container" id="card-container">
            <div id="no-results">
                <h3>No matching vehicles found</h3>
            </div>
        </div>
    </div>

    <script>
        const apiURL = 'https://script.google.com/macros/s/AKfycby3M69HaTJ4MoDdOqfn3HFnSBvbxTdSh1yohD1Oki0vrYwkYcWG75tSjekuIoDjua-gaA/exec';
        let fleetData = [];
        
        // Credentials
        const VALID_USER = "Dbsinfra99";
        const VALID_PASS = "DbS@#99";

        // Login Logic
        function goToPassword() {
            const user = document.getElementById('userIdInput').value.trim();
            if (user === VALID_USER) {
                document.getElementById('step-userid').style.display = 'none';
                document.getElementById('step-password').style.display = 'block';
                document.getElementById('display-user').innerText = user;
                document.getElementById('passwordInput').focus();
            } else {
                alert("Invalid User ID");
            }
        }

        function backToUser() {
            document.getElementById('step-userid').style.display = 'block';
            document.getElementById('step-password').style.display = 'none';
            document.getElementById('userIdInput').focus();
        }

        function attemptLogin() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === VALID_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                document.getElementById('loading').style.display = 'block';
                initDashboard();
            } else {
                alert("Incorrect Password");
            }
        }

        // Allow 'Enter' key for login
        document.getElementById('userIdInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goToPassword();
        });
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        // Dashboard Logic
        async function initDashboard() {
            try {
                const response = await fetch(apiURL);
                fleetData = await response.json();
                document.getElementById('loading').style.display = 'none';
                populateFilters(fleetData);
                document.getElementById('totalVehicles').innerText = `Total: ${fleetData.length}`;
                renderCards(fleetData);
            } catch (error) {
                document.getElementById('loading').innerHTML = `<span style="color:red">❌ Failed to load data.</span>`;
            }
        }

        function populateFilters(data) {
            const bodyTypes = new Set();
            const companies = new Set();
            data.forEach(item => {
                if (item["EQUIPMENT BODY"]) bodyTypes.add(item["EQUIPMENT BODY"].toString().trim());
                if (item["COMPANY"]) companies.add(item["COMPANY"].toString().trim());
            });
            const bodyDropdown = document.getElementById('bodyFilter');
            const companyDropdown = document.getElementById('companyFilter');
            [...bodyTypes].sort().forEach(type => {
                if (type) bodyDropdown.innerHTML += `<option value="${type}">${type.toUpperCase()}</option>`;
            });
            [...companies].sort().forEach(co => {
                if (co) companyDropdown.innerHTML += `<option value="${co}">${co.toUpperCase()}</option>`;
            });
        }

        function formatDate(val, isMfgField = false) {
            if (!val || val === "—" || val === "") return "—";
            const raw = val.toString().trim();
            if (isMfgField) {
                if (raw.includes("T") && raw.includes("Z")) {
                    const d = new Date(val);
                    if (!isNaN(d.getTime())) {
                        return `${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
                    }
                }
                return raw;
            }
            const d = new Date(val);
            if (isNaN(d.getTime())) return val;
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getFullYear()).slice(-2)}`;
        }

        function renderCards(data) {
            const container = document.getElementById('card-container');
            const noResults = document.getElementById('no-results');
            const today = new Date();
            today.setHours(0,0,0,0);
            container.innerHTML = '';
            container.appendChild(noResults);

            data.forEach(item => {
                const regNo = (item["REGN NO"] || "UNKNOWN").toString().toUpperCase();
                const bodyType = (item["EQUIPMENT BODY"] || "").toString();
                const company = (item["COMPANY"] || "").toString();
                
                let cardContent = '';
                let expiredKeys = []; 
                let isNotWorking = false;

                for (let key in item) {
                    if (item[key] && item[key].toString().trim().toUpperCase() === 'Y') {
                        isNotWorking = true;
                        break;
                    }
                }

                Object.keys(item).forEach(key => {
                    const cleanKey = key.trim().toUpperCase();
                    const valStr = (item[key] || "").toString();
                    if (cleanKey.includes("SR. NO") || cleanKey === "REGN NO" || cleanKey === "LOGO" || 
                        valStr.includes("http") || cleanKey === "") return;

                    let rawVal = (item[key] || "—").toString().trim();
                    let isRegistrationDate = cleanKey.includes("REG DATE") || cleanKey.includes("REGN DATE") || cleanKey.includes("REGISTRATION DATE");
                    let isCheckable = ["EXP", "VALID", "FITNESS", "INSURANCE", "PERMIT", "PUC", "FORM-10", "TAX"].some(k => cleanKey.includes(k));
                    let isYearOfMfg = cleanKey.includes("MFG") || cleanKey.includes("MANUFACTURING");

                    let typeClass = "";
                    if (cleanKey.includes("PUC")) typeClass = "type-puc";
                    else if (cleanKey.includes("INSURANCE")) typeClass = "type-insurance";
                    else if (cleanKey.includes("FITNESS")) typeClass = "type-fitness";
                    else if (cleanKey.includes("FORM-10")) typeClass = "type-form10";
                    else if (cleanKey.includes("VALID UP TO")) typeClass = "type-validupto";
                    else if (cleanKey.includes("PERMIT") || cleanKey.includes("TAX")) typeClass = "type-permit";

                    let displayVal = rawVal;
                    let valueClass = "val-normal";

                    if (isYearOfMfg) {
                        displayVal = formatDate(rawVal, true);
                    } else if ((isCheckable || isRegistrationDate || cleanKey.includes("MFG DATE")) && rawVal !== "—" && rawVal.toUpperCase() !== "LTT") {
                        const d = new Date(rawVal);
                        if (!isNaN(d.getTime())) {
                            displayVal = formatDate(rawVal, false);
                            if (isCheckable && !isRegistrationDate) {
                                let checkDate = new Date(d);
                                checkDate.setHours(0,0,0,0);
                                if (checkDate < today && !isNotWorking) {
                                    valueClass = "val-expired";
                                    expiredKeys.push(typeClass.replace('type-', ''));
                                } else {
                                    valueClass = "val-active";
                                }
                            }
                        }
                    }

                    cardContent += `<div class="info-row ${typeClass}">
                        <span class="label">${key}</span>
                        <span class="value ${valueClass}">${displayVal}</span>
                    </div>`;
                });

                const hasAction = expiredKeys.length > 0 && !isNotWorking;
                const cardHtml = `
                    <div class="card" 
                         data-regno="${regNo}" 
                         data-body="${bodyType}"
                         data-company="${company}"
                         data-expired-types="${isNotWorking ? '' : [...new Set(expiredKeys)].join(',')}"
                         data-any-expired="${hasAction}">
                        <div class="card-header">
                            <span class="reg-no">${regNo}</span>
                            <span class="status-badge ${isNotWorking ? 'status-maintenance' : (hasAction ? 'status-expired' : 'status-active')}">
                                ${isNotWorking ? 'Not Working' : (hasAction ? 'Expired' : 'Active')}
                            </span>
                        </div>
                        <div class="card-body">${cardContent}</div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
            updateShowingCount();
        }

        function filterCards() {
            const search = document.getElementById('searchInput').value.toUpperCase();
            const expFilter = document.getElementById('expiryFilter').value;
            const bodyFilter = document.getElementById('bodyFilter').value;
            const companyFilter = document.getElementById('companyFilter').value;
            const cards = document.querySelectorAll('.card');
            let visibleCount = 0;

            cards.forEach(card => {
                const reg = card.getAttribute('data-regno');
                const body = card.getAttribute('data-body');
                const company = card.getAttribute('data-company');
                const expiredList = card.getAttribute('data-expired-types')?.split(',') || [];
                const isAnyExp = card.getAttribute('data-any-expired') === 'true';

                const matchesSearch = reg.includes(search);
                const matchesBody = (bodyFilter === 'all' || body === bodyFilter);
                const matchesCompany = (companyFilter === 'all' || company === companyFilter);
                let matchesExp = (expFilter === 'all') ? true : (expFilter === 'any' ? isAnyExp : expiredList.includes(expFilter));

                if (matchesSearch && matchesBody && matchesCompany && matchesExp) {
                    card.style.display = 'flex';
                    visibleCount++;
                    const rows = card.querySelectorAll('.info-row');
                    rows.forEach(row => {
                        if (expFilter === 'all' || expFilter === 'any') row.classList.remove('hidden');
                        else {
                            if (row.classList.contains(`type-${expFilter}`)) row.classList.remove('hidden');
                            else row.classList.add('hidden');
                        }
                    });
                } else card.style.display = 'none';
            });
            document.getElementById('no-results').style.display = (visibleCount === 0) ? 'block' : 'none';
            updateShowingCount();
        }

        function updateShowingCount() {
            const visible = document.querySelectorAll('.card:not([style*="display: none"])').length;
            const countEl = document.getElementById('showingCount');
            if(countEl) countEl.innerText = `Showing: ${visible}`;
        }
    </script>
</body>
</html>
