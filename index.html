<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crane Fleet Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0061ff;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
        }

        .header {
            background: white;
            padding: 20px 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            justify-content: center;
        }

        .search-wrapper {
            position: relative;
            grid-column: span 1;
        }

        @media (min-width: 900px) {
            .search-wrapper { grid-column: span 2; }
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input, .filter-select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            background: #fff;
            box-sizing: border-box;
            height: 48px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .filter-select {
            padding-left: 15px;
            cursor: pointer;
            font-weight: 600;
            background-color: #f1f5f9;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2003/svg' fill='none' viewBox='0 0 24 24' stroke='%2364748b'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'%3E%3C/path%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .stats-bar {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .counter {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            background: #eff6ff;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .reg-no { font-weight: 800; font-size: 1.15rem; color: #1e293b; }
        
        .status-badge {
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status-expired { background: #fee2e2; color: #ef4444; }
        .status-active { background: #dcfce7; color: #10b981; }
        .status-maintenance { background: #f1f5f9; color: #64748b; }

        .card-body { padding: 20px; }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #f1f5f9;
        }

        .info-row.hidden { display: none; }

        .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .value {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
        }

        /* Styles for values */
        .expired-val { color: var(--danger) !important; background: #fff1f2 !important; padding: 2px 6px; border-radius: 4px; }
        .reg-date-val { color: #000000 !important; background: #dcfce7 !important; padding: 2px 6px !important; border-radius: 4px; font-weight: 800 !important; }
        .mfg-val { color: var(--text-main); font-weight: 800 !important; }

        #loading { text-align: center; padding: 100px; font-weight: 600; color: var(--text-muted); }
        #no-results { grid-column: 1 / -1; text-align: center; padding: 80px; background: white; border-radius: 20px; display: none; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏗️ CRANE-FLEET <span style="color:var(--primary)">PRO</span></h1>
        
        <div class="controls">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search Reg. No..." onkeyup="filterCards()">
            </div>
            
            <select id="expiryFilter" class="filter-select" onchange="filterCards()">
                <option value="all">📂 ALL DOCUMENTS</option>
                <option value="puc">⚠️ PUC VALID UP TO</option>
                <option value="insurance">🛡️ INSURANCE VALID UP TO</option>
                <option value="fitness">🔧 FITNESS VALID UP TO</option>
                <option value="permit">📝 ROAD TAX VALID UP TO</option>
                <option value="form10">📄 FORM-10 VALID UP TO</option>
                <option value="validupto">📅 PERMIT VALID UP TO</option>
                <option value="any">🚨 ANY EXPIRED</option>
            </select>

            <select id="bodyFilter" class="filter-select" onchange="filterCards()">
                <option value="all">🚜 ALL BODY TYPES</option>
            </select>

            <select id="companyFilter" class="filter-select" onchange="filterCards()">
                <option value="all">🏢 ALL COMPANIES</option>
            </select>
        </div>

        <div class="stats-bar">
            <div class="counter" id="totalVehicles">Total: --</div>
            <div class="counter" id="showingCount">Showing: --</div>
        </div>
    </div>

    <div id="loading">Syncing Fleet Data...</div>

    <div class="container" id="card-container">
        <div id="no-results">
            <h3>No matching vehicles found</h3>
        </div>
    </div>

    <script>
        const apiURL = 'https://script.google.com/macros/s/AKfycby3M69HaTJ4MoDdOqfn3HFnSBvbxTdSh1yohD1Oki0vrYwkYcWG75tSjekuIoDjua-gaA/exec';
        let fleetData = [];

        async function initDashboard() {
            try {
                const response = await fetch(apiURL);
                fleetData = await response.json();
                document.getElementById('loading').style.display = 'none';
                populateFilters(fleetData);
                document.getElementById('totalVehicles').innerText = `Total: ${fleetData.length}`;
                renderCards(fleetData);
            } catch (error) {
                document.getElementById('loading').innerHTML = `<span style="color:red">❌ Failed to load data. API Link check karo.</span>`;
            }
        }

        function populateFilters(data) {
            const bodyTypes = new Set();
            const companies = new Set();
            data.forEach(item => {
                if (item["EQUIPMENT BODY"]) bodyTypes.add(item["EQUIPMENT BODY"].toString().trim());
                if (item["COMPANY"]) companies.add(item["COMPANY"].toString().trim());
            });
            const bodyDropdown = document.getElementById('bodyFilter');
            const companyDropdown = document.getElementById('companyFilter');
            [...bodyTypes].sort().forEach(type => {
                if (type) bodyDropdown.innerHTML += `<option value="${type}">${type.toUpperCase()}</option>`;
            });
            [...companies].sort().forEach(co => {
                if (co) companyDropdown.innerHTML += `<option value="${co}">${co.toUpperCase()}</option>`;
            });
        }

        function formatAnyDate(val, isMfg = false) {
            if (!val || val === "—" || val === "") return "—";
            const d = new Date(val);
            if (isNaN(d.getTime())) return val;
            if (isMfg) return `${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
            return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getFullYear()).slice(-2)}`;
        }

        function renderCards(data) {
            const container = document.getElementById('card-container');
            const noResults = document.getElementById('no-results');
            const today = new Date();
            container.innerHTML = '';
            container.appendChild(noResults);

            data.forEach(item => {
                const regNo = (item["REGN NO"] || "UNKNOWN").toString().toUpperCase();
                const bodyType = (item["EQUIPMENT BODY"] || "").toString();
                const company = (item["COMPANY"] || "").toString();
                
                let cardContent = '';
                let expiredKeys = []; 
                let isNotWorking = false;

                // Check if the vehicle is "Not Working"
                for (let key in item) {
                    if (item[key] && item[key].toString().trim().toUpperCase() === 'Y') {
                        isNotWorking = true;
                        break;
                    }
                }

                Object.keys(item).forEach(key => {
                    const cleanKey = key.trim().toUpperCase();
                    const valStr = (item[key] || "").toString();
                    
                    if (cleanKey.includes("SR. NO") || cleanKey === "REGN NO" || cleanKey === "LOGO" || 
                        valStr.includes("http") || cleanKey === "") return;

                    let rawVal = (item[key] || "—").toString().trim();
                    let isExpired = false;
                    let isRegDate = cleanKey.includes("REG DATE") || cleanKey.includes("REGN DATE") || cleanKey.includes("REGISTRATION DATE");
                    let isMfgDate = cleanKey.includes("YEAR OF MFG") || cleanKey.includes("MFG");
                    
                    let typeClass = "";
                    if (cleanKey.includes("PUC")) typeClass = "type-puc";
                    else if (cleanKey.includes("INSURANCE")) typeClass = "type-insurance";
                    else if (cleanKey.includes("FITNESS")) typeClass = "type-fitness";
                    else if (cleanKey.includes("FORM-10")) typeClass = "type-form10";
                    else if (cleanKey.includes("VALID UP TO")) typeClass = "type-validupto";
                    else if (cleanKey.includes("PERMIT") || cleanKey.includes("TAX")) typeClass = "type-permit";

                    const isCheckable = ["DATE", "EXP", "VALID", "FITNESS", "INSURANCE", "PERMIT", "PUC", "FORM-10", "TAX"].some(k => cleanKey.includes(k));
                    
                    // Logic fix: Only check for expiry if it's NOT a registration date
                    if (!isRegDate && isCheckable && rawVal !== "—" && rawVal.toUpperCase() !== "LTT" && rawVal.toUpperCase() !== "Y") {
                        const d = new Date(rawVal);
                        if (!isNaN(d.getTime()) && !isMfgDate && !isNotWorking) {
                            if (d < today) {
                                isExpired = true;
                                if (cleanKey.includes("PUC")) expiredKeys.push("puc");
                                else if (cleanKey.includes("INSURANCE")) expiredKeys.push("insurance");
                                else if (cleanKey.includes("FITNESS")) expiredKeys.push("fitness");
                                else if (cleanKey.includes("FORM-10")) expiredKeys.push("form10");
                                else if (cleanKey.includes("VALID UP TO")) expiredKeys.push("validupto");
                                else if (cleanKey.includes("PERMIT") || cleanKey.includes("TAX")) expiredKeys.push("permit");
                            }
                        }
                    }

                    let formattedVal = formatAnyDate(rawVal, isMfgDate);
                    
                    // Priority CSS class assignment
                    let statusClass = "";
                    if (isRegDate) {
                        statusClass = 'reg-date-val'; // Strict green for registration
                    } else if (isMfgDate) {
                        statusClass = 'mfg-val';
                    } else if (isExpired) {
                        statusClass = 'expired-val'; // Red for others if expired
                    }

                    cardContent += `<div class="info-row ${typeClass}"><span class="label">${key}</span><span class="value ${statusClass}">${formattedVal}</span></div>`;
                });

                const hasAction = expiredKeys.length > 0 && !isNotWorking;

                const cardHtml = `
                    <div class="card" 
                         data-regno="${regNo}" 
                         data-body="${bodyType}"
                         data-company="${company}"
                         data-expired-types="${isNotWorking ? '' : [...new Set(expiredKeys)].join(',')}"
                         data-any-expired="${hasAction}">
                        <div class="card-header">
                            <div class="header-left"><span class="reg-no">${regNo}</span></div>
                            <span class="status-badge ${isNotWorking ? 'status-maintenance' : (hasAction ? 'status-expired' : 'status-active')}">
                                ${isNotWorking ? 'Not Working' : (hasAction ? 'Expired' : 'Active')}
                            </span>
                        </div>
                        <div class="card-body">${cardContent}</div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
            updateShowingCount();
        }

        function filterCards() {
            const search = document.getElementById('searchInput').value.toUpperCase();
            const expFilter = document.getElementById('expiryFilter').value;
            const bodyFilter = document.getElementById('bodyFilter').value;
            const companyFilter = document.getElementById('companyFilter').value;
            const cards = document.querySelectorAll('.card');
            let visibleCount = 0;
            cards.forEach(card => {
                const reg = card.getAttribute('data-regno');
                const body = card.getAttribute('data-body');
                const company = card.getAttribute('data-company');
                const expiredList = card.getAttribute('data-expired-types')?.split(',') || [];
                const isAnyExp = card.getAttribute('data-any-expired') === 'true';
                const matchesSearch = reg.includes(search);
                const matchesBody = (bodyFilter === 'all' || body === bodyFilter);
                const matchesCompany = (companyFilter === 'all' || company === companyFilter);
                let matchesExp = (expFilter === 'all') ? true : (expFilter === 'any' ? isAnyExp : expiredList.includes(expFilter));

                if (matchesSearch && matchesBody && matchesCompany && matchesExp) {
                    card.style.display = 'flex';
                    visibleCount++;
                    const rows = card.querySelectorAll('.info-row');
                    rows.forEach(row => {
                        if (expFilter === 'all' || expFilter === 'any') row.classList.remove('hidden');
                        else {
                            if (row.classList.contains(`type-${expFilter}`)) row.classList.remove('hidden');
                            else row.classList.add('hidden');
                        }
                    });
                } else card.style.display = 'none';
            });
            document.getElementById('no-results').style.display = (visibleCount === 0) ? 'block' : 'none';
            updateShowingCount();
        }

        function updateShowingCount() {
            const visible = document.querySelectorAll('.card:not([style*="display: none"])').length;
            document.getElementById('showingCount').innerText = `Showing: ${visible}`;
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
